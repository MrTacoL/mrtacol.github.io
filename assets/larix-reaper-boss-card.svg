<svg width="900" height="360" viewBox="0 0 900 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08060D"/>
      <stop offset="0.5" stop-color="#160713"/>
      <stop offset="1" stop-color="#05070D"/>
    </linearGradient>
    <linearGradient id="slash" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ff1744" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ff1744" stop-opacity="1"/>
      <stop offset="1" stop-color="#ff7a18" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .card { animation: float 4s ease-in-out infinite; transform-origin: center; }
      .aura { animation: pulse 2.6s ease-in-out infinite; transform-origin: center; }
      .slash { animation: slashMove 2.2s ease-in-out infinite; }
      .spark { animation: spark 1.8s ease-in-out infinite; }
      .spark:nth-of-type(2n) { animation-delay: .35s; }
      .spark:nth-of-type(3n) { animation-delay: .7s; }
      .title { font: 800 46px Arial, sans-serif; letter-spacing: 2px; }
      .sub { font: 700 17px Arial, sans-serif; letter-spacing: 3px; }
      .body { font: 500 18px Arial, sans-serif; }
      .tag { font: 700 13px Arial, sans-serif; letter-spacing: 1px; }
      @keyframes float { 0%,100%{ transform: translateY(0px);} 50%{ transform: translateY(-10px);} }
      @keyframes pulse { 0%,100%{ opacity:.35; transform: scale(.96);} 50%{ opacity:.9; transform: scale(1.04);} }
      @keyframes slashMove { 0%{ transform: translateX(-170px) rotate(-15deg); opacity:0;} 35%{ opacity:1;} 70%{ opacity:1;} 100%{ transform: translateX(520px) rotate(-15deg); opacity:0;} }
      @keyframes spark { 0%,100%{ opacity:.25; transform: translateY(0);} 50%{ opacity:1; transform: translateY(-12px);} }
    </style>
  </defs>

  <rect width="900" height="360" rx="34" fill="url(#bg)"/>
  <rect x="2" y="2" width="896" height="356" rx="32" stroke="#ff1744" stroke-opacity=".35" stroke-width="2"/>
  <circle class="aura" cx="240" cy="170" r="130" fill="#ff1744" opacity=".18" filter="url(#glow)"/>
  <circle class="aura" cx="240" cy="170" r="82" fill="#ff7a18" opacity=".16" filter="url(#glow)"/>

  <g class="slash" filter="url(#glow)">
    <rect x="0" y="72" width="450" height="9" rx="5" fill="url(#slash)"/>
    <rect x="35" y="92" width="350" height="5" rx="3" fill="url(#slash)" opacity=".7"/>
  </g>

  <g class="card">
    <ellipse cx="240" cy="274" rx="86" ry="17" fill="#000" opacity=".45"/>
    <path d="M240 65 C196 82 167 134 171 199 C174 251 202 284 240 292 C278 284 306 251 309 199 C313 134 284 82 240 65Z" fill="#15121a" stroke="#ff1744" stroke-opacity=".55" stroke-width="4"/>
    <path d="M205 115 L175 62 L209 102 L220 68 L229 110 Z" fill="#22202a" stroke="#ff1744" stroke-opacity=".5" stroke-width="3"/>
    <path d="M275 115 L305 62 L271 102 L260 68 L251 110 Z" fill="#22202a" stroke="#ff1744" stroke-opacity=".5" stroke-width="3"/>
    <path d="M205 169 C220 150 260 150 275 169 C265 205 215 205 205 169Z" fill="#0b0a10" stroke="#ff7a18" stroke-opacity=".55" stroke-width="3"/>
    <circle cx="222" cy="170" r="10" fill="#ff1744" filter="url(#glow)"/>
    <circle cx="258" cy="170" r="10" fill="#ff1744" filter="url(#glow)"/>
    <path d="M232 199 L248 199 L240 218 Z" fill="#ff7a18" opacity=".7"/>
    <path d="M195 225 C218 244 262 244 285 225" stroke="#ff1744" stroke-opacity=".65" stroke-width="4" stroke-linecap="round"/>
    <path d="M128 258 C122 178 137 111 173 78" stroke="#cfd8e5" stroke-opacity=".45" stroke-width="8" stroke-linecap="round"/>
    <path d="M121 88 C172 41 231 41 296 88" stroke="#dfe7f5" stroke-width="10" stroke-linecap="round"/>
    <path d="M122 88 C188 61 242 58 296 88" stroke="#ff1744" stroke-opacity=".75" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  </g>

  <g>
    <text x="435" y="104" class="sub" fill="#ff7a18">FEATURED BOSS</text>
    <text x="435" y="160" class="title" fill="#ffffff">LARIX REAPER</text>
    <text x="435" y="200" class="body" fill="#b9c2d0">Dark fantasy Bedrock boss with custom model, texture,</text>
    <text x="435" y="226" class="body" fill="#b9c2d0">animations, entity setup, and cinematic fight direction.</text>
    <g transform="translate(435 260)">
      <rect width="112" height="34" rx="17" fill="#ff1744" fill-opacity=".16" stroke="#ff1744" stroke-opacity=".55"/>
      <text x="21" y="23" class="tag" fill="#ffd6df">MODEL</text>
      <rect x="126" width="142" height="34" rx="17" fill="#ff1744" fill-opacity=".16" stroke="#ff1744" stroke-opacity=".55"/>
      <text x="148" y="23" class="tag" fill="#ffd6df">ANIMATED</text>
      <rect x="282" width="132" height="34" rx="17" fill="#ff1744" fill-opacity=".16" stroke="#ff1744" stroke-opacity=".55"/>
      <text x="307" y="23" class="tag" fill="#ffd6df">BEDROCK</text>
    </g>
  </g>

  <circle class="spark" cx="92" cy="83" r="3" fill="#ff7a18"/>
  <circle class="spark" cx="352" cy="62" r="4" fill="#ff1744"/>
  <circle class="spark" cx="389" cy="289" r="3" fill="#ff7a18"/>
  <circle class="spark" cx="802" cy="76" r="4" fill="#ff1744"/>
  <circle class="spark" cx="826" cy="295" r="3" fill="#ff7a18"/>
</svg>
