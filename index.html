<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mrtacosi</title>
  <meta name="description" content="mrtacosi profile page" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="background"></div>
  <div class="vignette"></div>
  <div class="grain"></div>
  <img class="car" src="./assets/neon-car.svg" alt="Neon black sports car" />
  <canvas id="weatherCanvas" aria-hidden="true"></canvas>

  <button class="sound-toggle" id="soundToggle" aria-label="Toggle sound">
    <span id="soundIcon">🔈</span>
  </button>

  <main class="stage">
    <section class="profile" aria-label="Profile card">
      <h1 class="name" id="profileName">mrtacosi</h1>

      <div class="activity-card">
        <div class="avatar-fallback" id="avatar" aria-hidden="true">Z</div>
        <div class="status-dot" id="statusDot" aria-hidden="true"></div>

        <div class="activity-text">
          <strong id="discordName">mrtacosi</strong>
          <span id="activityLine">Playing Code</span>
          <small id="activitySubline">Idling</small>
        </div>

        <div class="device-icon" aria-hidden="true">⌨</div>
      </div>

      <nav class="socials" aria-label="Social links">
        <a href="https://github.com/MrTacoL" target="_blank" rel="noreferrer" aria-label="GitHub">GH</a>
        <a href="https://steamcommunity.com/" target="_blank" rel="noreferrer" aria-label="Steam">ST</a>
      </nav>

      <div class="views" aria-label="Views">◉ <span>1</span></div>
    </section>
  </main>

  <audio id="music" preload="none" loop></audio>
  <script src="./config.js"></script>
  <script src="./script.js"></script>
</body>
</html>
